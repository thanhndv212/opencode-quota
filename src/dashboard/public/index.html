<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Quota Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 OpenCode Quota Dashboard</h1>
      <div class="controls">
        <select id="provider-select" multiple>
          <option value="anthropic" selected>Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openrouter">OpenRouter</option>
          <option value="google">Google</option>
        </select>
        <select id="timerange-select">
          <option value="1">Last 24 hours</option>
          <option value="7" selected>Last 7 days</option>
          <option value="30">Last 30 days</option>
        </select>
        <button id="refresh-btn">↻ Refresh</button>
      </div>
    </header>
    
    <section class="quota-cards" id="quota-cards">
      <!-- Dynamically rendered quota cards -->
      <div class="loading">Loading quota data...</div>
    </section>
    
    <section class="chart-section">
      <h2>Quota Burn-down (Remaining %)</h2>
      <canvas id="burndown-chart"></canvas>
    </section>
    
    <section class="chart-section">
      <h2>Model Usage Breakdown (Cost)</h2>
      <canvas id="model-chart"></canvas>
    </section>
    
    <section class="table-section">
      <h2>Weekly Reset History</h2>
      <table id="reset-history-table">
        <thead>
          <tr>
            <th>Provider</th>
            <th>Date</th>
            <th>Used</th>
            <th>Remaining</th>
            <th>Utilization</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5" class="loading">Loading reset history...</td></tr>
        </tbody>
      </table>
    </section>
  </div>
  
  <script src="dashboard.js"></script>
</body>
</html>
